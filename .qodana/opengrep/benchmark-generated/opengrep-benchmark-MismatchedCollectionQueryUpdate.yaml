rules:
  - id: opengrep-benchmark-MismatchedCollectionQueryUpdate
    message: "Reports collections whose contents are either queried and not updated, or updated and not queried. Such inconsistent queries and updates are pointless and may indicate either dead code or a typo. Use the inspection settings to specify name patterns that correspond to update/query methods. Query methods that return an element are automatically detected, and only those that write data to an output parameter (for example, an 'OutputStream') need to be specified."
    languages: [java]
    severity: WARNING
    pattern: '@Argument(..., multiValued = true, ...)' 
