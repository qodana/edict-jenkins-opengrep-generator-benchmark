rules:
  - id: opengrep-benchmark-SynchronizationOnLocalVariableOrMethodParameter
    message: Synchronizing on a method parameter or local variable is error-prone and can lead to incorrect behavior. Synchronize on a dedicated field or lock object instead.
    languages: [java]
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern: |
              $RET $METHOD(..., $TYPE $L, ...) {
                ...
                synchronized ($L) {
                  ...
                }
                ...
              }
          - pattern: |
              $RET $METHOD(...) {
                ...
                $TYPE $L = ...;
                ...
                synchronized ($L) {
                  ...
                }
                ...
              }
          - pattern: |
              $RET $METHOD(...) {
                ...
                $TYPE $L;
                ...
                synchronized ($L) {
                  ...
                }
                ...
              }
