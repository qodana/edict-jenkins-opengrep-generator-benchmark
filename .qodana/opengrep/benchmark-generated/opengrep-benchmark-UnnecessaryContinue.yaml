rules:
  - id: opengrep-benchmark-UnnecessaryContinue
    message: "Unnecessary 'continue': it is the last reachable statement in the loop and can be removed."
    languages: [java]
    severity: WARNING
    pattern-either:
      - pattern: |
          for ($T $E : $COL) {
            ...
            continue;
          }
      - pattern: |
          for ($I; $C; $U) {
            ...
            continue;
          }
      - pattern: |
          while ($C) {
            ...
            continue;
          }
      - pattern: |
          do {
            ...
            continue;
          } while ($C);
      - pattern: |
          for ($T $E : $COL) {
            ...
            if ($COND) {
              ...
              continue;
            }
          }
      - pattern: |
