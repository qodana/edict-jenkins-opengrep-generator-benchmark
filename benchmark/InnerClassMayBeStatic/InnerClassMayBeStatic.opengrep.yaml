rules:
  - id: InnerClassMayBeStatic
    message: Reports inner classes that can be made 'static'. A 'static' inner class does not keep an implicit reference to its enclosing instance and can reduce memory usage and prevent leaks on Java 17 and earlier.
    languages: [java]
    severity: WARNING
    patterns:
      - pattern: |
          private class $INNER {
            ...
          }
      - pattern-not: |
          private static class $INNER {
            ...
          }
