rules:
  - id: CopyConstructorMissesField
    message: "Reports copy constructors that don't copy all the fields of the class. 'final' fields with initializers and 'transient' fields are considered unnecessary to copy."
    languages: [java]
    severity: WARNING
    patterns:
      - pattern: |
          class $C {
            ...
            $C($C $OTHER) {
              ...
            }
            ...
          }
      - pattern-not: |
          class $C {
            ...
            $C($C $OTHER) {
              ...
              this.$F = ...;
              ...
            }
            ...
          }
      - pattern-not: |
          class $C {
            ...
            $C($C $OTHER) {
              ...
              $F = ...;
              ...
            }
            ...
          }
      - pattern-not: |
          class $C {
            ...
            $C($C $OTHER) {
              ...
              this(...);
              ...
            }
            ...
          }
      - pattern-not: |
          class $C {
            ...
            @SuppressWarnings("CopyConstructorMissesField")
            $C($C $OTHER) {
              ...
            }
            ...
          }
